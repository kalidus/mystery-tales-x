<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Mystery Tales X - Aventura gráfica point-and-click" />
    <title>Mystery Tales X - Isla Bruma</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family: 'Courier New', Courier, monospace;
        color: #cfe9d4;
      }
      #game-root {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        image-rendering: crisp-edges;
        -ms-interpolation-mode: nearest-neighbor;
        display: block;
      }
      #loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #070910;
        color: #7cff8a;
        font-size: 14px;
        letter-spacing: 2px;
        z-index: 10;
      }
      #loading.hidden { display: none; }
      ::selection { background: #7cff8a; color: #070910; }
    </style>
  </head>
  <body>
    <div id="loading">Cargando Isla Bruma...</div>
    <div id="game-root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
